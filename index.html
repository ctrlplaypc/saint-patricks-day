<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>Quiz CNA</title>

<link rel="stylesheet" href="style.css">

</head>

<body tabindex="0">

<audio id="bgMusic" loop>
  <source src="sounds/musica.mp3" type="audio/mpeg">
</audio>

<img src="assets/logo.png" class="logo direita">
<img src="assets/logocp.png" class="logo esquerda">

<div id="setup">

<h1>QUIZ</h1>

<h2>Quantos jogadores?</h2>

<button onclick="startGame(1)">1 Player</button>
<button onclick="startGame(2)">2 Players</button>

<div id="modeSelect" style="display:none">

<h2>Modo de jogo</h2>

<button onclick="setMode(10)">Jogo rápido (10 perguntas)</button>
<button onclick="setMode(20)">20 perguntas</button>
<button onclick="setMode(100)">Até alguém fazer 100 pontos</button>

</div>

</div>


<div id="game" style="display:none">

<div class="top">

<div id="score1box">Player 1: <span id="score1">0</span></div>

<div id="score2box">Player 2: <span id="score2">0</span></div>

<div id="timer">10</div>

</div>

<h2 id="question"></h2>

<div id="answers"></div>

<div id="status"></div>

<button id="endBtn" onclick="endGame()">Encerrar partida</button>

</div>


<div id="result" style="display:none">

<h1>Resultado</h1>

<div id="finalScore"></div>

<button onclick="location.reload()">Jogar novamente</button>

</div>

<script src="script.js"></script>

</body>
</html>
